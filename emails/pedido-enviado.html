<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pedido a caminho</title>
</head>
<body style="margin:0;padding:0;background:#f0f4ee;font-family:'Segoe UI',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f0f4ee;padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
        <tr><td style="background:linear-gradient(135deg,#ffc421,#d99e06);border-radius:24px 24px 0 0;padding:36px;text-align:center;">
          <div style="font-size:34px;font-weight:800;">
            <span style="color:#e5173f;">Q</span><span style="color:#ffffff;">Pet</span><span style="color:#17181c;">Shop</span> <span style="font-size:24px;">🐾</span>
          </div>
        </td></tr>
        <tr><td style="background:#ffffff;padding:40px 36px;text-align:center;">
          <div style="font-size:56px;">🚚</div>
          <h1 style="color:#17181c;font-size:26px;margin:16px 0 8px;">Seu pedido está a caminho!</h1>
          <p style="color:#666;font-size:15px;line-height:1.6;margin:0 0 24px;">
            {{nome}}, o pedido <strong>#{{numero_pedido}}</strong> saiu para entrega.
            Previsão de chegada: <strong style="color:#4caf2e;">{{previsao_entrega}}</strong>.
          </p>
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
            <tr><td style="background:#fff8e1;border-radius:16px;padding:20px;text-align:center;">
              <p style="color:#925c0e;font-size:12px;font-weight:700;margin:0;">CÓDIGO DE RASTREIO</p>
              <p style="color:#17181c;font-size:22px;font-weight:800;letter-spacing:2px;margin:6px 0 0;">{{codigo_rastreio}}</p>
            </td></tr>
          </table>
          <a href="{{url_rastreio}}" style="display:inline-block;background:#4caf2e;color:#ffffff;text-decoration:none;font-weight:800;font-size:16px;padding:16px 40px;border-radius:999px;margin-top:28px;">
            Rastrear entrega →
          </a>
        </td></tr>
        <tr><td style="background:#17181c;border-radius:0 0 24px 24px;padding:28px 36px;text-align:center;">
          <p style="color:#999;font-size:12px;margin:0;">QPet Shop · Carinho Q faz a diferença 💚</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
